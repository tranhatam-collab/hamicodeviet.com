<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#081826"/>
      <stop offset="100%" style="stop-color:#102A43"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Code brackets -->
  <text x="80" y="200" font-family="monospace" font-size="80" fill="#00A8CC" opacity="0.3">&lt;/&gt;</text>
  <!-- Logo H M -->
  <text x="100" y="280" font-family="Inter,sans-serif" font-size="72" font-weight="800" fill="#F7FAFC">HaMi <tspan fill="#00A8CC">&lt;CODE&gt;</tspan> <tspan fill="#FFC857">Việt</tspan></text>
  <!-- Tagline VI -->
  <text x="100" y="360" font-family="Inter,sans-serif" font-size="36" font-weight="600" fill="#F7FAFC">Học ngôn ngữ. Học lập trình. Làm ra sản phẩm thật.</text>
  <!-- Tagline EN -->
  <text x="100" y="410" font-family="Inter,sans-serif" font-size="28" fill="#00A8CC">Learn languages. Learn to code. Build real products.</text>
  <!-- Age groups -->
  <rect x="100" y="470" width="180" height="50" rx="25" fill="#FFC857"/>
  <text x="190" y="502" text-anchor="middle" font-family="Inter,sans-serif" font-size="20" font-weight="700" fill="#102A43">8-24 tuổi</text>
  <rect x="300" y="470" width="200" height="50" rx="25" fill="#20A779"/>
  <text x="400" y="502" text-anchor="middle" font-family="Inter,sans-serif" font-size="20" font-weight="700" fill="white">Song ngữ VI-EN</text>
  <rect x="520" y="470" width="180" height="50" rx="25" fill="#00A8CC"/>
  <text x="610" y="502" text-anchor="middle" font-family="Inter,sans-serif" font-size="20" font-weight="700" fill="white">15 sản phẩm code</text>
  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="#00A8CC"/>
  <text x="600" y="620" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" fill="white">hamicodeviet.com</text>
</svg>
