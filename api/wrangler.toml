name = "hamicodeviet-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

account_id = "93112cc89181e75335cbd7ef7e392ba3"

workers_dev = true

routes = [
  { pattern = "api.hamicodeviet.com", custom_domain = true }
]

[vars]
APP_URL = "https://app.hamicodeviet.com"

# Durable Objects for globally-consistent rate limiting
[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiterDurableObject"

# Queues for email delivery with retry + DLQ
[[queues.producers]]
queue = "email-delivery"
binding = "EMAIL_QUEUE"

[[queues.consumers]]
queue = "email-delivery"
max_batch_size = 5
max_batch_timeout = 10
max_retries = 3
dead_letter_queue = "email-dlq"

[[queues.producers]]
queue = "email-dlq"
binding = "EMAIL_DLQ"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimiterDurableObject"]
